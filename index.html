<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Company</title>
    <style>
        /* Loading the custom local fonts from the Font folder */
        @font-face {
            font-family: 'Cocogoose';
            src: url('Font/COCOGOOSE-PRO-REGULAR-TRIAL.TTF') format('truetype');
            font-weight: 400; 
            font-style: normal;
        }

        @font-face {
            font-family: 'Cocogoose';
            src: url('Font/COCOGOOSE-PRO-BOLD-TRIAL.TTF') format('truetype');
            font-weight: 700; 
            font-style: normal;
        }

        /* Loading the Century Gothic font for the description */
        @font-face {
            font-family: 'Century Gothic';
            src: url('Font/CENTURY GOTHIC.TTF') format('truetype');
            font-weight: 400; /* Regular weight */
            font-style: normal;
        }

        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            
            /* Animated Rolling Gradient Background */
            background: linear-gradient(135deg, #050505, #1f1f1f, #0a0a0a, #2a2a2a);
            background-size: 400% 400%;
            animation: gradientRoll 15s ease infinite;

            color: white;
            /* Applying Cocogoose globally to all text as the default */
            font-family: 'Cocogoose', sans-serif;
            overflow: hidden; 
        }

        /* Keyframes for the rolling background animation */
        @keyframes gradientRoll {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .company-logo {
            height: 40px; 
        }

        .company-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        /* Home Icon Styling */
        .home-icon {
            height: 24px;
            width: auto;
            filter: invert(1); 
            opacity: 0.7;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        nav a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        nav a:hover .home-icon {
            opacity: 1;
            transform: scale(1.2); 
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 100px;
            padding-right: 100px;
            position: relative;
        }

        .content-wrapper {
            width: fit-content; 
        }

        h1 {
            font-size: 48px;
            font-weight: 700; /* Triggers the BOLD Cocogoose file */
            margin: 0;
            color: white;
            white-space: nowrap; 
        }

        .normal-weight {
            font-weight: 400; /* Triggers the REGULAR Cocogoose file */
        }

        /* The expanded line under the title */
        .fancy-line {
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), transparent);
            margin: 15px 0 20px 0;
            width: 100%; 
        }

        p {
            /* Overriding the global font to use Century Gothic specifically here */
            font-family: 'Century Gothic', sans-serif;
            font-weight: 400; /* Ensuring it is strictly unbolded */
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin: 0 0 35px 0;
            max-width: 600px; 
            white-space: normal; 
        }

        /* 3D Offset Discord Button */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #3b4cca; 
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: -6px 6px 0px #58A6FF;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            margin-top: 5px;
            width: fit-content; 
        }

        .discord-btn:hover {
            transform: translate(-2px, 2px); 
            box-shadow: -4px 4px 0px #58A6FF; 
        }

        .discord-btn:active {
            transform: translate(-6px, 6px); 
            box-shadow: 0px 0px 0px #58A6FF; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Image/WhiteCompany.png" alt="White Company Icon" class="company-logo">
            <span class="company-name">White Company</span>
        </div>
        <nav>
            <a href="#" class="active">
                <img src="Image/image_5bffde.png" alt="Home" class="home-icon">
            </a>
        </nav>
    </header>

    <main>
        <div class="content-wrapper">
            <h1><span class="normal-weight">Welcome to</span> White Company</h1>
            <div class="fancy-line"></div>
            <p>The Only company run by a small dev that's trying to make projects that are entertaining and kickstarting the fun</p>
            <a href="https://discord.gg/tcSqqJXc3A" target="_blank" class="discord-btn">
                Discord Invite
            </a>
        </div>
    </main>

</body>
</html>
