<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Company</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            /* Changed from red gradient to a clean dark theme to fit the black/white icon */
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* Prevents scrollbar */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .company-logo {
            height: 40px; /* Scaled to font size */
            /* Removed the invert filter so your original icon colors show perfectly */
        }

        .company-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 5px 10px;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav a.active {
            color: white;
            border-bottom: 2px solid white;
        }

        nav a:hover:not(.active) {
            color: white;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 100px;
            padding-right: 100px;
            position: relative;
        }

        .title-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            color: white; /* Text is now pure white */
            white-space: nowrap;
        }

        /* The fancy line from the original photo, colored white, with a hover animation */
        .fancy-line {
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.6), transparent);
            margin-left: 30px;
            width: 150px; /* Starting width */
            opacity: 0.5;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }

        /* Triggers the line animation when hovering over the title container */
        .title-container:hover .fancy-line {
            width: 500px;
            opacity: 1;
        }

        p {
            /* Century Gothic applied strictly to the description */
            font-family: "Century Gothic", AppleGothic, sans-serif;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            max-width: 600px;
            line-height: 1.6;
            margin: 0 0 30px 0;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #5865F2; /* Standard Discord Blue */
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            max-width: 150px;
            margin-top: 10px;
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .discord-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="WhiteCompany.png" alt="White Company Icon" class="company-logo">
            <span class="company-name">WHITE COMPANY</span>
        </div>
        <nav>
            <a href="#" class="active">Home</a>
        </nav>
    </header>

    <main>
        <div class="title-container">
            <h1>Welcome to White Company</h1>
            <div class="fancy-line"></div>
        </div>
        <p>The Only company run by a small dev that's trying to make projects that are entertaining and kickstarting the fun</p>
        <a href="https://discord.gg/tcSqqJXc3A" target="_blank" class="discord-btn">
            Discord Invite
        </a>
    </main>

</body>
</html>
