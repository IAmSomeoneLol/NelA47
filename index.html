<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Company</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; 
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .company-logo {
            height: 40px; 
        }

        .company-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        /* Home Icon Styling */
        .home-icon {
            height: 24px;
            width: auto;
            /* Inverts the black icon to white so it shows up on the dark background */
            filter: invert(1); 
            opacity: 0.7;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        nav a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        /* Hover animation for the house icon */
        nav a:hover .home-icon {
            opacity: 1;
            transform: scale(1.2); /* Scales up slightly on hover */
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 100px;
            padding-right: 100px;
            position: relative;
        }

        .content-wrapper {
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            color: white;
        }

        /* The animated line under the title */
        .fancy-line {
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), transparent);
            margin: 15px 0 20px 0;
            width: 80px; /* Starting width */
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Triggers the line to expand when hovering over the content area */
        .content-wrapper:hover .fancy-line {
            width: 100%;
        }

        p {
            font-family: "Century Gothic", AppleGothic, sans-serif;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin: 0 0 35px 0;
        }

        /* 3D Offset Discord Button */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #3b4cca; /* Deep blue main body */
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            /* Creates the lighter blue shadow offset to the bottom left */
            box-shadow: -6px 6px 0px #58A6FF;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            margin-top: 5px;
        }

        /* Press animation for the 3D button */
        .discord-btn:hover {
            transform: translate(-2px, 2px); /* Moves down and left slightly */
            box-shadow: -4px 4px 0px #58A6FF; /* Shadow shrinks to simulate pressing */
        }

        .discord-btn:active {
            transform: translate(-6px, 6px); /* Fully pressed state */
            box-shadow: 0px 0px 0px #58A6FF; /* Shadow disappears */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="WhiteCompany.png" alt="White Company Icon" class="company-logo">
            <span class="company-name">WHITE COMPANY</span>
        </div>
        <nav>
            <a href="#" class="active">
                <img src="image_5bffde.png" alt="Home" class="home-icon">
            </a>
        </nav>
    </header>

    <main>
        <div class="content-wrapper">
            <h1>Welcome to White Company</h1>
            <div class="fancy-line"></div>
            <p>The Only company run by a small dev that's trying to make projects that are entertaining and kickstarting the fun</p>
            <a href="https://discord.gg/tcSqqJXc3A" target="_blank" class="discord-btn">
                Discord Invite
            </a>
        </div>
    </main>

</body>
</html>
