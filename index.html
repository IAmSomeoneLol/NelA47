<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Company</title>
    <style>
        /* Loading the custom local fonts from the Font folder */
        @font-face {
            font-family: 'Cocogoose';
            src: url('Font/COCOGOOSE-PRO-REGULAR-TRIAL.TTF') format('truetype');
            font-weight: 400; 
            font-style: normal;
        }

        @font-face {
            font-family: 'Cocogoose';
            src: url('Font/COCOGOOSE-PRO-BOLD-TRIAL.TTF') format('truetype');
            font-weight: 700; 
            font-style: normal;
        }

        @font-face {
            font-family: 'Century Gothic';
            src: url('Font/CENTURY GOTHIC.TTF') format('truetype');
            font-weight: 400; 
            font-style: normal;
        }

        /* Loading the Cavilant font */
        @font-face {
            font-family: 'Cavilant';
            src: url('Font/CAVILANT-X3JAZ.TTF') format('truetype');
            font-weight: normal; 
            font-style: normal;
        }

        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            
            /* Animated Rolling Gradient Background */
            background: linear-gradient(135deg, #050505, #1f1f1f, #0a0a0a, #2a2a2a);
            background-size: 400% 400%;
            animation: gradientRoll 15s ease infinite;

            color: white;
            font-family: 'Cocogoose', sans-serif;
            overflow: hidden; 
        }

        @keyframes gradientRoll {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .company-logo {
            height: 40px; 
        }

        .company-name {
            font-family: 'Cavilant', sans-serif;
            font-size: 28px; 
            font-weight: normal;
            color: white;
            letter-spacing: 1px; 
        }

        /* Navigation and Animation Container */
        .nav-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-icon {
            height: 24px;
            width: auto;
            filter: invert(1); 
            opacity: 0.7;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            cursor: pointer;
        }

        .nav-container a {
            display: flex;
            align-items: center;
            text-decoration: none;
            position: relative;
            z-index: 2;
        }

        .nav-container:hover .home-icon {
            opacity: 1;
            transform: scale(1.2); 
        }

        /* "HOME" text appearing on hover */
        .home-label {
            position: absolute;
            right: 35px; /* Sits to the left of the icon */
            font-family: 'Cavilant', sans-serif;
            font-size: 14px;
            color: #00e5ff; /* Change this hex code to match your exact drawing color */
            opacity: 0;
            transform: translateX(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .nav-container:hover .home-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* Vertical animated line */
        .nav-line-vertical {
            position: absolute;
            top: 30px; 
            right: 11px; 
            width: 2px;
            height: 0;
            background-color: #00e5ff; /* Change this hex code to match your exact drawing color */
            transition: height 0.3s ease;
            z-index: 1;
        }

        /* Horizontal animated line */
        .nav-line-horizontal {
            position: absolute;
            top: 150px; /* Connects to the bottom of the vertical line */
            right: 11px;
            height: 2px;
            width: 0;
            background-color: #00e5ff; /* Change this hex code to match your exact drawing color */
            transition: width 0.4s ease; /* Retracts instantly when mouse leaves */
            z-index: 1;
        }

        /* Triggering the lines on hover */
        .nav-container:hover .nav-line-vertical {
            height: 120px; /* Expands downwards */
        }

        .nav-container:hover .nav-line-horizontal {
            width: 85vw; /* Expands left across the screen */
            transition-delay: 0.3s; /* Waits for the vertical line to finish expanding */
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 100px;
            padding-right: 100px;
            position: relative;
        }

        .content-wrapper {
            width: fit-content; 
        }

        h1 {
            font-size: 48px;
            font-weight: 700; 
            margin: 0;
            color: white;
            white-space: nowrap; 
        }

        .normal-weight {
            font-weight: 400; 
        }

        .fancy-line {
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), transparent);
            margin: 15px 0 20px 0;
            width: 100%; 
        }

        p {
            font-family: 'Century Gothic', sans-serif;
            font-weight: 400; 
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin: 0 0 35px 0;
            max-width: 600px; 
            white-space: normal; 
        }

        /* 3D Offset Discord Button */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #3b4cca; 
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: -6px 6px 0px #58A6FF;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            margin-top: 5px;
            width: fit-content; 
        }

        .discord-btn:hover {
            transform: translate(-2px, 2px); 
            box-shadow: -4px 4px 0px #58A6FF; 
        }

        .discord-btn:active {
            transform: translate(-6px, 6px); 
            box-shadow: 0px 0px 0px #58A6FF; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Image/WhiteCompany.png" alt="White Company Icon" class="company-logo">
            <span class="company-name">WHITE COMPANY</span>
        </div>
        
        <nav class="nav-container">
            <span class="home-label">HOME</span>
            <a href="https://nel-a47.vercel.app/#" class="active">
                <img src="Image/image_5bffde.png" alt="Home" class="home-icon">
            </a>
            <div class="nav-line-vertical"></div>
            <div class="nav-line-horizontal"></div>
        </nav>
    </header>

    <main>
        <div class="content-wrapper">
            <h1><span class="normal-weight">Welcome to</span> White Company</h1>
            <div class="fancy-line"></div>
            <p>The Only company run by a small dev that's trying to make projects that are entertaining and kickstarting the fun</p>
            <a href="https://discord.gg/tcSqqJXc3A" target="_blank" class="discord-btn">
                Discord Invite
            </a>
        </div>
    </main>

</body>
</html>
